name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRAPHED_CORE: "graphed-core @ git+https://github.com/graphed-org/graphed-core@main"
  GRAPHED: "graphed @ git+https://github.com/graphed-org/graphed@main"

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install graphed-core + graphed + this package
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.GRAPHED_CORE }}"
          python -m pip install "${{ env.GRAPHED }}"
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest + coverage gate (>=90%)
        run: pytest tests/frozen --cov=graphed_numpy --cov-branch --cov-report=term-missing

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.GRAPHED_CORE }}" "${{ env.GRAPHED }}"
          python -m pip install -e ".[docs,dev]"
          sphinx-build -W -b html docs docs/_build/html
