name: ci

on:
  push:
    branches: [main, "backup/**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRAPHED_CORE: "graphed-core @ git+https://github.com/graphed-org/graphed-core-mvp@main"
  GRAPHED: "graphed @ git+https://github.com/graphed-org/graphed-mvp@main"

jobs:
  test:
    name: test ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install graphed-core + graphed + this package
        run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.GRAPHED_CORE }}"
          python -m pip install "${{ env.GRAPHED }}"
          python -m pip install -e ".[dev]"
      - uses: astral-sh/setup-uv@v5
      - name: Lint + types (pre-commit hooks via prek)
        run: uvx prek@0.4.5 run --all-files --show-diff-on-failure
      - name: Pytest + coverage gate (>=90%)
        run: pytest tests/frozen --cov=graphed_numpy --cov-branch --cov-report=term-missing

  # Free-threaded Python (plan A.5) — like the sibling repos; deps may lag, so advisory for now.
  test-experimental:
    name: test (experimental) py${{ matrix.python }}
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.GRAPHED_CORE }}" "${{ env.GRAPHED }}"
          python -m pip install -e ".[dev]"
          pytest tests/frozen

  docs:
    name: docs (sphinx -W)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          python -m pip install "${{ env.GRAPHED_CORE }}" "${{ env.GRAPHED }}"
          python -m pip install -e ".[docs,dev]"
          sphinx-build -W -b html docs docs/_build/html
